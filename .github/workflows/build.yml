name: Build VEX PLAYER Windows

on: 
  workflow_dispatch: # Inakuruhusu ku-run kwa mkono

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller requests

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon "icon.ico" --name "VEX_PLAYER_V2" vex_v2.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VEX_PLAYER_V2_EXE
        path: dist/VEX_PLAYER_V2.exe
